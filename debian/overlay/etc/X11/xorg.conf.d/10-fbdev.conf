# Unihiker M10: SPI ILI9341 via fbtft -> /dev/fb0 (typically 320x240)
Section "Device"
    Identifier  "FBDEV"
    Driver      "fbdev"
    Option      "fbdev" "/dev/fb0"
EndSection

Section "Screen"
    Identifier  "Default Screen"
    Device      "FBDEV"
    Monitor     "Default Monitor"
    DefaultDepth 16
    SubSection "Display"
        Depth   16
        Modes   "320x240"
    EndSubSection
EndSection

Section "Monitor"
    Identifier  "Default Monitor"
    Option      "Rotate" "normal"
EndSection
